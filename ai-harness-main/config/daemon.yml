# ai-harness-main daemon 設定ファイル
# 配置先: <インストール先>/config/daemon.yml （本体＝実行体の直下。各プロジェクトではない）
# 単一の共有 daemon が全プロジェクトをさばくため、この設定はグローバル（プロジェクト個別ではない）。
#
# 読むのは daemon 起動時の 1 回のみ。変更の反映には再起動が要る（ai-harness-main --restart）。
# プロジェクト個別設定（common.yml・各プラグイン YAML）のホットリロードとは別系統。
#
# ファイルが無い・壊れている・値が 1 未満の場合は、その項目の既定値で動く（警告ログを出して継続）。
# 何も強制しない実行時パラメータのため、フェイルクローズしない。

# プロジェクトの状態（設定・有効プラグイン・ログ・ファイル監視）をメモリに保つ時間（分）。既定 30。
# 無アクセスがこれを超えたプロジェクトをスイーパが回収する。次のアクセスで再構築されるため、
# 短いほどメモリを解放しやすく、長いほど再構築（設定の再読込・Init）を避けられる。
# 全プロジェクトが回収されてメモリが空になった時点で daemon 自体も終了する
# ＝この値が「Claude Code 終了後に daemon が居座る時間」の上限になる。
evictAfterMinutes: 30

# 接続が全く無い状態がこれを超えたら、生存プロジェクトの有無を確認する（分）。既定 5。
# 空（全て回収済み）なら daemon を終了し、生存していれば待受を続ける。
# 保持時間の上限ではない（確認の間隔）。回収は evictAfterMinutes で決まる。
idleShutdownMinutes: 5

# スイーパの走査間隔（秒）。既定 60。回収判定の粒度で、実際の回収は最大この分だけ遅れる。
sweepIntervalSeconds: 60
