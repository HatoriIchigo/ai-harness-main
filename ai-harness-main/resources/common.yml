# ai-harness プロジェクト個別設定ファイル
# 配置先: <プロジェクトルート>/.claude/harness/config/common.yml
# 単一の共有 daemon が、このファイルでプロジェクトごとに挙動を決める。
# 各種 YAML はホットリロード対象（保存すると daemon が当該プロジェクトを再構築）。

# 診断ログの出力閾値。これ未満のレベルは破棄。
# 指定可能: Trace / Debug / Info / Warning / Error
logLevel: Info

# プラグイン発火の同時実行数上限。0 または未指定で論理プロセッサ数。
maxParallel: 0

# 有効化するプラグイン。キーは各プラグインの PluginName、値は true/false。
# true のみ有効化。false および未記載のプラグインは無効（一切発火しない）。
# ここに書いた PluginName が lib（共有）に存在しない場合、そのガードは効かないため
# フェイルクローズ＝当該プロジェクトの hook は全て deny される（--validate で検出できる）。
# 手で書くほか ai-harness-main --plugin --enable <プラグイン名> でも切り替えられる。
# 例:
#   tools:
#     - ai-harness-deny: true
#     - ai-harness-inject: false
tools: []
